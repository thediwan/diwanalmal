pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.11.1" apply false
    id "org.jetbrains.kotlin.android" version "2.2.20" apply false
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_PROJECT)
    repositories {
        google()
        mavenCentral()
    }
}

// sqlite3_flutter_libs pins AGP 8.7.3 in its buildscript; force a version
// available from Google Maven that matches this project.
gradle.beforeProject { project ->
    project.buildscript {
        repositories {
            google()
            mavenCentral()
            gradlePluginPortal()
        }
        configurations.classpath {
            resolutionStrategy.eachDependency { details ->
                if (details.requested.group == "com.android.tools.build"
                        && details.requested.name == "gradle") {
                    details.useVersion("8.11.1")
                    details.because("Align plugin AGP with root project")
                }
            }
        }
    }
}

include ":app"
