name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Read Flutter version
        id: flutter
        run: echo "version=$(cat .flutter-version)" >> "$GITHUB_OUTPUT"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.flutter.outputs.version }}
          channel: stable
          cache: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: flutter pub get --enforce-lockfile

      - name: Generate Drift code
        run: dart run build_runner build

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test

      - name: Build release APKs
        run: flutter build apk --release --split-per-abi

      - name: Rename APK artifacts
        run: |
          VERSION_CODE=$(grep '^version:' pubspec.yaml | sed 's/.*+//')
          mkdir -p release-artifacts
          for apk in build/app/outputs/flutter-apk/app-*-release.apk; do
            abi=$(basename "$apk" | sed 's/app-//;s/-release.apk//')
            cp "$apk" "release-artifacts/diwanalmal-${VERSION_CODE}-${abi}.apk"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
