name: baytalmal
description: "Personal finance manager - offline first."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  provider: ^6.1.2
  go_router: ^14.6.2
  uuid: ^4.5.1
  intl: ^0.20.2
  local_auth: ^2.3.0
  local_auth_android: ^1.0.56
  local_auth_darwin: ^1.6.1
  drift: 2.33.0
  drift_flutter: 0.3.0
  path_provider: ^2.1.5
  path: ^1.9.0
  sqlite3: 3.3.2
  package_info_plus: ^8.3.0
  image_picker: ^1.1.2
  fl_chart: ^1.2.0
  workmanager: ^0.9.0
  flutter_local_notifications: ^19.5.0
  timezone: ^0.10.1
  file_picker: ^8.1.7
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  archive: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3
  drift_dev: ^2.33.0
  build_runner: ^2.4.13

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: assets/icon/app_icon.png
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: true
    image_path: assets/icon/app_icon.png
    background_color: "#000000"
    theme_color: "#000000"
  windows:
    generate: true
    image_path: assets/icon/app_icon.png
    icon_size: 256
  macos:
    generate: true
    image_path: assets/icon/app_icon.png

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Qomra
      fonts:
        - asset: assets/fonts/Qomra.ttf
    - family: Alyamama
      fonts:
        - asset: assets/fonts/Alyamama.ttf
