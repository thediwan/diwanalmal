name: baytalmal
description: "Personal finance manager - offline first."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  provider: ^6.1.2
  go_router: ^14.6.2
  uuid: ^4.5.1
  intl: ^0.20.2
  google_fonts: ^8.1.0
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  adaptive_icon_background: "#2563EB"
  adaptive_icon_foreground: assets/icon/app_icon.png
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  # Add Qomra font files to assets/fonts/ then uncomment:
  # fonts:
  #   - family: Qomra
  #     fonts:
  #       - asset: assets/fonts/Qomra-Regular.ttf
  #         weight: 400
  #       - asset: assets/fonts/Qomra-Bold.ttf
  #         weight: 700
